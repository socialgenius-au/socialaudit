version: "3.9"
services:
  db:
    image: postgres:15
    container_name: socialgenius_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: socialgenius
      POSTGRES_PASSWORD: socialgenius_dev
      POSTGRES_DB: socialgenius
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U socialgenius"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: socialgenius_redis
    restart: unless-stopped
    ports:
      - "6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: socialgenius_backend
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgresql://socialgenius:socialgenius_dev@db:5432/socialgenius
      REDIS_URL: redis://redis:6379
    volumes:
      - ./backend:/app
    ports:
      - "8010:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: socialgenius_frontend
    restart: unless-stopped
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "3010:3000"
    depends_on:
      - backend
    command: yarn dev --host 0.0.0.0 --port 3000

volumes:
  postgres_data:
